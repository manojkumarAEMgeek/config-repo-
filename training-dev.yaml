server:
  port: 9095

management:
  endpoint:
    configprops:
      show-values: ALWAYS
    env:
      show-values: ALWAYS
  endpoints:
    web:
      exposure:
        include: '*'
      path-mapping:
        health: devHealthCheck
      base-path: /devProfile
  metrics:
    distribution:
      percentiles:
        http:
          server:
            requests: 0.5,0.9, 0.99
      percentiles-histogram:
        http:
          server:
            requests: true


